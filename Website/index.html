<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afbeelding Downloaden</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 1rem;
        }

        p {
            color: #666;
            margin-bottom: 2rem;
        }

        .download-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .download-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Steganografie</h1>
        <p>Klik op de onderstaande knop om de bewerkte afbeelding te downloaden.</p>
        
        <!-- Gebruik de afbeelding in dezelfde map -->
        <img src="output.png" alt="Voorbeeld van bewerkte afbeelding" style="max-width: 100%; height: auto; border-radius: 4px; margin-bottom: 20px;"> 
        
        <!-- De button, wijst nu naar de afbeelding in dezelfde map -->
        <a href="output.png" download="output.png" class="download-btn" id="downloadBtn">Download Afbeelding</a>
    </div>

</body>
</html>
